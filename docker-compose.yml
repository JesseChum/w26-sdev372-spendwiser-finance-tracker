services:
  db:
    image: mysql:8
    container_name: spendwiser-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: spendwiser
    volumes:
      - db_data:/var/lib/mysql
      - ./Backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  test-db:
    image: mysql:8
    container_name: spendwiser-test-db
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: testpassword
      MYSQL_DATABASE: spendwiser_test
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 5s

  backend-test-runner:
    build: ./Backend
    container_name: spendwiser-backend-test-runner
    environment:
      DB_HOST: test-db
      DB_USER: root
      DB_PASSWORD: testpassword
      DB_NAME: spendwiser_test
      NODE_ENV: test
    depends_on:
      test-db:
        condition: service_healthy
    command: npm run test:ci
    restart: "no"

  frontend-test-runner:
    build: ./Frontend
    container_name: spendwiser-frontend-test-runner
    command: npm run test:ci
    restart: "no"

  backend:
    build: ./Backend
    container_name: spendwiser-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: spendwiser
      DB_PORT: 3306
    depends_on:
      - db

  frontend:
    build: ./Frontend
    container_name: spendwiser-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
