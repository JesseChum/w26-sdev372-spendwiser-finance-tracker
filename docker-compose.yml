services:
  db:
    image: mysql:8
    container_name: spendwiser-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: spendwiser
    volumes:
      - db_data:/var/lib/mysql
      - ./Backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 5s
    networks:
      - app-network

  test-db:
    image: mysql:8
    container_name: spendwiser-test-db
    restart: "no"
    environment:
      MYSQL_ROOT_PASSWORD: testpassword
      MYSQL_DATABASE: spendwiser_test
    volumes:
      - ./Backend/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 5s
    networks:
      - app-network

  backend:
    build: ./Backend
    container_name: spendwiser-backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: spendwiser
      DB_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build: ./Frontend
    container_name: spendwiser-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    networks:
      - app-network

  integration-tests:
    build: ./
    container_name: spendwiser-integration-tests
    ipc: host
    environment:
      DB_HOST: test-db
      DB_USER: root
      DB_PASSWORD: testpassword
      DB_NAME: spendwiser_test
      NODE_ENV: test
    depends_on:
      test-db:
        condition: service_healthy
      backend:
        condition: service_started
      frontend:
        condition: service_started
    command: sh -c "echo 'Waiting for services...' && sleep 15 && npm run test:docker"
    restart: "no"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data: